<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f7eaed">
<link rel="apple-touch-icon" href="expense_icon.png">
<link rel="icon" href="expense_icon.png">
<title>Spend</title>
<style>
  :root{
    --bg:#f7eaed; --card:#fdf8f5; --card2:#f1e2e5; --line:#ecdade;
    --ink:#4c3c41; --ink2:#8c7980; --ink3:#c2adb3;
    --mint:#caa06a; --mint-bg:#f0e4cf; --peach:#d68a6e; --blush:#cf6f86; --lav:#c78a9e;
    --need:#5a9e7e; --need-bg:#e9f2ec; --want:#d4836c; --want-bg:#fbe9e1;
    --shadow:0 1px 2px rgba(120,80,95,.06),0 2px 6px rgba(120,80,95,.05);
    --pad:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{height:100%;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    font-feature-settings:"tnum" 1;overscroll-behavior:none}
  body{display:flex;flex-direction:column;max-width:520px;margin:0 auto;min-height:100%}
  .num{font-variant-numeric:tabular-nums}

  header{padding:9px 18px 3px;text-align:center}
  .month{font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--lav);font-weight:700}
  .mtot{font-size:30px;font-weight:700;margin-top:1px;letter-spacing:-1px;color:var(--ink)}
  .sub{font-size:12px;color:var(--ink2);margin-top:3px}
  .bar{height:5px;background:var(--card2);border-radius:6px;margin:7px 24px 0;overflow:hidden}
  .bar > i{display:block;height:100%;background:var(--mint);width:0;border-radius:6px;transition:width .3s,background .3s}

  .amt{font-size:38px;font-weight:700;text-align:center;padding:2px 0 12px;letter-spacing:-1.5px;min-height:42px;color:var(--ink)}
  .amt small{font-size:20px;color:var(--ink3);font-weight:600;margin-right:5px}
  .amt.zero{color:var(--ink3)}

  .quick{display:flex;gap:6px;padding:0 16px 10px;overflow-x:auto;min-height:26px;scrollbar-width:none}
  .quick::-webkit-scrollbar{display:none}
  .chip:first-child{margin-left:auto}
  .chip:last-child{margin-right:auto}
  .chip{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);
    padding:7px 12px;font-size:12px;font-weight:600;color:var(--ink);white-space:nowrap;cursor:pointer;transition:.1s}
  .chip:active{transform:scale(.93);background:var(--mint-bg)}
  .chip b{color:var(--mint)}

  .pop{position:fixed;left:50%;top:36%;font-size:22px;pointer-events:none;z-index:50;animation:pop .7s ease-out forwards}
  @keyframes pop{from{transform:translate(0,0) scale(.6);opacity:1}to{transform:translate(var(--dx),var(--dy)) scale(1.3);opacity:0}}

  .toggles{display:flex;flex-direction:column;gap:6px;padding:0 16px 7px}
  .seg{display:flex;background:var(--card2);border-radius:13px;padding:3px;gap:3px}
  .seg button{flex:1;border:0;background:transparent;color:var(--ink2);font-size:13px;font-weight:600;
    padding:8px 4px;border-radius:10px;transition:.15s;cursor:pointer}
  .seg button.on{background:var(--card);color:var(--ink);box-shadow:var(--shadow)}
  .seg.need button.on[data-v="need"]{color:var(--need);background:var(--need-bg)}
  .seg.need button.on[data-v="want"]{color:var(--want);background:var(--want-bg)}
  button:focus{outline:none}

  .cat-ph{visibility:hidden}
  .note{display:block;width:calc(100% - 32px);margin:8px 16px 2px;background:var(--card);
    border:1px solid var(--line);box-shadow:var(--shadow);border-radius:12px;
    padding:9px 13px;font-size:13px;color:var(--ink);outline:none}
  .note::placeholder{color:var(--ink3)}
  .note:focus{border-color:var(--lav)}
  .cats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;padding:0 16px}
  .cat{background:var(--card);border:1px solid var(--line);border-radius:15px;box-shadow:var(--shadow);
    padding:9px 5px;display:flex;flex-direction:column;align-items:center;gap:3px;
    color:var(--ink);font-size:12px;font-weight:600;transition:transform .08s,background .12s;cursor:pointer}
  .cat:active{transform:scale(.93);background:var(--mint-bg)}
  .cat .e{font-size:21px;line-height:1}
  .cat.flash{background:var(--mint);color:#fff;border-color:var(--mint)}

  .keys{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:8px 16px 2px}
  .key{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);
    color:var(--ink);font-size:22px;font-weight:600;padding:11px 0;transition:.08s;cursor:pointer}
  .key:active{background:var(--card2);transform:scale(.96)}
  .key.act{color:var(--lav)}

  .foot{display:flex;gap:8px;padding:7px 16px calc(8px + var(--pad))}
  .foot button{flex:1;background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);
    color:var(--ink2);font-size:12px;font-weight:600;padding:9px 4px;border-radius:12px;cursor:pointer}
  .foot button:active{background:var(--card2)}

  .sheet{position:fixed;inset:0;background:rgba(60,45,90,.28);display:none;align-items:flex-end;z-index:30}
  .sheet.open{display:flex}
  .sheet > div{background:var(--bg);width:100%;max-width:520px;margin:0 auto;border-radius:22px 22px 0 0;
    max-height:84vh;overflow:auto;padding:18px 18px calc(22px + var(--pad));box-shadow:0 -8px 30px rgba(60,45,90,.15)}
  .sheet h2{font-size:16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;font-weight:700}
  .sheet h2 span{color:var(--ink3);font-size:13px;font-weight:500}
  .x{color:var(--ink3);font-size:22px;border:0;background:none;cursor:pointer;line-height:1}
  .row{display:flex;justify-content:space-between;align-items:center;padding:11px 4px;border-bottom:1px solid var(--line);font-size:14px}
  .row.rowc{cursor:pointer}
  .row.rowc:active{background:var(--card2)}
  .row:last-child{border:0}
  .row .l{display:flex;align-items:center;gap:10px}
  .row .e{font-size:18px}
  .row small{color:var(--ink3);font-size:11px;display:block;margin-top:1px}
  .del{color:var(--blush);background:none;border:0;font-size:12px;font-weight:600;cursor:pointer;padding:6px}
  .bdh{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--lav);font-weight:700;margin:18px 0 4px}
  .copybtn{width:100%;background:var(--mint);color:#fff;border:0;border-radius:13px;font-size:15px;
    font-weight:700;padding:14px;margin-top:18px;cursor:pointer;box-shadow:var(--shadow)}
  .setrow{display:flex;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--line)}
  .setrow input{flex:1;background:var(--card);border:1px solid var(--line);color:var(--ink);
    border-radius:10px;padding:10px;font-size:14px}
  .mini{font-size:11px;color:var(--ink3);text-align:center;margin-top:8px;line-height:1.6}
  .nudge{margin:0 16px 7px;background:var(--want-bg);border:1px solid var(--line);border-radius:12px;
    padding:9px 12px;font-size:12px;color:var(--ink);display:none;cursor:pointer;box-shadow:var(--shadow);text-align:center}
  .nudge b{color:var(--want)}
  .last{position:fixed;left:50%;bottom:calc(78px + var(--pad));transform:translateX(-50%) translateY(16px);
    width:calc(100% - 28px);max-width:492px;background:var(--card);border:1px solid var(--line);
    border-radius:16px;padding:10px 12px;opacity:0;pointer-events:none;transition:.25s;z-index:40;
    box-shadow:0 6px 20px rgba(60,45,90,.22)}
  .last.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
  .ltop{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--ink)}
  .ltop .x{margin-left:auto}
  .lchips{display:flex;gap:6px;margin-top:8px;align-items:center}
  .lchip{border:1px solid var(--line);background:var(--card2);border-radius:14px;padding:6px 12px;
    font-size:12px;font-weight:600;color:var(--ink);cursor:pointer}
  .lchip.n-on{background:var(--need-bg);color:var(--need);border-color:transparent}
  .lchip.w-on{background:var(--want-bg);color:var(--want);border-color:transparent}
  .lhint{margin-left:auto;font-size:11px;color:var(--ink3)}
  .pace{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:11px 13px;
    font-size:13px;color:var(--ink2);margin-bottom:4px}
  .pace b{color:var(--need)}
  .pace.over b{color:var(--blush)}
  .heat{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin:6px 0 10px}
  .heat div{height:30px;border-radius:7px;background:var(--card2);display:flex;align-items:center;
    justify-content:center;font-size:10px;color:var(--ink2)}
  .up{color:var(--blush);font-size:11px;font-weight:700}
  .dn{color:var(--need);font-size:11px;font-weight:700}
  .toast{position:fixed;left:50%;bottom:calc(82px + var(--pad));transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;font-weight:700;font-size:13px;padding:10px 18px;border-radius:22px;
    opacity:0;transition:.25s;pointer-events:none;z-index:40;box-shadow:0 6px 20px rgba(60,45,90,.22)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .heat div:active{transform:scale(.92)}
  .upd{position:fixed;top:calc(env(safe-area-inset-top,0px) + 8px);left:50%;transform:translateX(-50%);
    display:flex;align-items:center;gap:8px;background:var(--ink);color:#fff;font-size:12px;font-weight:600;
    padding:7px 8px 7px 14px;border-radius:22px;z-index:60;box-shadow:0 6px 20px rgba(60,45,90,.28)}
  .upd button{border:0;background:var(--mint);color:#fff;font-weight:700;font-size:12px;padding:6px 12px;border-radius:16px}
  .upd .updx{background:transparent;color:var(--ink3);padding:6px 4px}
</style>
</head>
<body>
  <header>
    <div class="month" id="monthLbl">тАФ</div>
    <div class="mtot num" id="mtot">RM 0</div>
    <div class="sub" id="sub">RM 0 today</div>
    <div class="bar"><i id="bar"></i></div>
  </header>

  <div class="amt zero num" id="amt"><small>RM</small>0</div>

  <div class="quick" id="quick"></div>

  <div class="toggles">
    <div class="seg" id="methodSeg"></div>
    <div class="seg need" id="needSeg">
      <button data-v="need">Need</button>
      <button data-v="want">Want</button>
    </div>
  </div>

  <div class="cats" id="cats"></div>

  <input id="note" class="note" placeholder="note (optional) ┬╖ e.g. flight, gym, haircut" autocomplete="off" enterkeyhint="done">

  <div class="keys" id="keys"></div>

  <div class="nudge" id="nudge" onclick="backupFile()">ЁЯЫЯ It's been a while тАФ <b>tap to save a backup file</b></div>

  <div class="foot">
    <button onclick="undoLast()">тЖй Undo</button>
    <button onclick="openSheet('recent')">Recent</button>
    <button onclick="openSheet('break')">Insights</button>
    <button onclick="openSheet('set')">тЪЩ<span id="cloud"></span></button>
  </div>

  <div class="sheet" id="sheet"><div id="sheetBody"></div></div>
  <div class="last" id="last"></div>
  <div class="toast" id="toast"></div>

<script>
"use strict";
var APP_VERSION='2026-07-08a'; /*APPVER:2026-07-08a*/
var DEFAULT_CATS = [
  {e:'ЁЯН╜я╕П',n:'Eating Out'},{e:'ЁЯЫТ',n:'Groceries'},{e:'ЁЯЫНя╕П',n:'Shopping'},
  {e:'ЁЯУж',n:'Online'},{e:'ЁЯР╛',n:'Gomi'},{e:'ЁЯУМ',n:'Other'},
  {e:'ЁЯЫ╡',n:'GrabFood'},{e:'ЁЯзЛ',n:'Drinks'}
];
var DEFAULT_METHODS = ['HLB','MB','TnG','Cash'];
var KEY='xpense_entries_v1', CKEY='xpense_cfg_v6';
function esc(s){return (s||'').replace(/[<>&"]/g,function(c){return {'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c];});}
function load(k,f){try{var v=JSON.parse(localStorage.getItem(k));return v==null?f:v;}catch(e){return f;}}
function save(k,v,quiet){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){} if(!quiet)schedSync();}

var entries = load(KEY, []);
var cfg = load(CKEY, {cats:DEFAULT_CATS, methods:DEFAULT_METHODS, method:'TnG', need:'want', budget:0});
if(!cfg.cats) cfg.cats = DEFAULT_CATS;
if(!cfg.methods || !cfg.methods.length) cfg.methods = DEFAULT_METHODS;
if(cfg.methods.indexOf(cfg.method)<0) cfg.method = cfg.methods[0];

function genId(){return crypto.randomUUID?crypto.randomUUID():(Date.now()+'-'+Math.random().toString(36).slice(2));}
(function backfillIds(){ // older/imported entries may predate the id field
  var added=false;
  entries.forEach(function(e){ if(!e.id){ e.id=genId(); added=true; } });
  if(added) save(KEY,entries,true);
})();

var amt = '';
var monthKey = ymKey(new Date());

function ymKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function dKey(d){return ymKey(d)+'-'+String(d.getDate()).padStart(2,'0');}
function fmt(n){return Math.round(n).toLocaleString('en-MY');}
function fmt2(n){return n%1? n.toFixed(2) : fmt(n);}
function entryDay(e){return e.ts? dKey(new Date(e.ts)) : '';}
function entryMonth(e){return entryDay(e).slice(0,7);}
function thisMonth(){return entries.filter(function(e){return entryMonth(e)===monthKey;});}
function todayKey(){return dKey(new Date());}
function streak(){
  var days={}; entries.forEach(function(e){days[entryDay(e)]=1;});
  var n=0, d=new Date();
  if(!days[dKey(d)]) d.setDate(d.getDate()-1); // today not logged yet doesn't break the streak
  while(days[dKey(d)]){n++;d.setDate(d.getDate()-1);}
  return n;
}

function renderTotals(){
  var mo = thisMonth(), mTot = mo.reduce(function(s,e){return s+e.amt;},0);
  var tToday = mo.filter(function(e){return entryDay(e)===todayKey();}).reduce(function(s,e){return s+e.amt;},0);
  document.getElementById('monthLbl').textContent =
    new Date(monthKey+'-01').toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  document.getElementById('mtot').textContent = 'RM '+fmt(mTot);
  var sub = 'RM '+fmt(tToday)+' today';
  if(cfg.budget>0){ sub += ' ┬╖ RM '+fmt(Math.max(cfg.budget-mTot,0))+' left of '+fmt(cfg.budget); }
  else { sub += ' ┬╖ set a budget in тЪЩ'; }
  var st=streak(); if(st>=2) sub += ' ┬╖ ЁЯФе'+st;
  document.getElementById('sub').textContent = sub;
  var bar=document.getElementById('bar');
  if(cfg.budget>0){var r=mTot/cfg.budget;bar.style.width=(Math.min(r,1)*100)+'%';
    bar.style.background = r>1?'var(--blush)': r>0.85?'var(--peach)':'var(--mint)';}
  else bar.style.width='0';
}
function renderAmt(){
  var el=document.getElementById('amt');
  el.innerHTML='<small>RM</small>'+(amt===''?'0':amt);
  el.classList.toggle('zero', amt==='');
}
function renderMethods(){
  var s=document.getElementById('methodSeg');s.innerHTML='';
  cfg.methods.forEach(function(m){
    var b=document.createElement('button');b.dataset.v=m;b.textContent=m;
    b.className=(m===cfg.method?'on':'');s.appendChild(b);
  });
}
function renderNeed(){
  document.querySelectorAll('#needSeg button').forEach(function(b){b.classList.toggle('on',b.dataset.v===cfg.need);});
}
function renderCats(){
  var c=document.getElementById('cats');c.innerHTML='';
  var cats=cfg.cats, n=cats.length, rem=n%3, head=rem?n-rem:n;
  cats.forEach(function(cat,idx){
    if(idx===head && rem){ // push the last partial row to the right so the most-used (last) sit bottom-right
      for(var s=0;s<(3-rem);s++){var ph=document.createElement('div');ph.className='cat-ph';c.appendChild(ph);}
    }
    var d=document.createElement('button');d.className='cat';
    d.innerHTML='<span class="e">'+cat.e+'</span>'+cat.n;
    d.onclick=function(){logExpense(cat,d);};
    c.appendChild(d);
  });
}
function renderKeys(){
  var k=document.getElementById('keys');k.innerHTML='';
  ['1','2','3','4','5','6','7','8','9','.','0','тМл'].forEach(function(t){
    var b=document.createElement('button');b.className='key'+(t==='тМл'||t==='.'?' act':'');b.textContent=t;
    b.onclick=function(){press(t);};k.appendChild(b);
  });
}
function renderQuick(){
  var q=document.getElementById('quick'); q.innerHTML='';
  var cut=Date.now()-30*864e5, g={};
  entries.forEach(function(e){
    if(!e.ts || new Date(e.ts).getTime()<cut) return;
    var k=e.e+'|'+e.cat+'|'+e.amt+'|'+e.need;
    g[k]=(g[k]||0)+1;
  });
  var top=Object.keys(g).filter(function(k){return g[k]>=2;})
    .sort(function(a,b){return g[b]-g[a];}).slice(0,3);
  q.style.display=top.length?'flex':'none';
  top.forEach(function(k){
    var p=k.split('|');
    var it={e:p[0],cat:p[1],amt:parseFloat(p[2]),need:p[3]};
    var b=document.createElement('button');b.className='chip';
    b.innerHTML=it.e+' '+esc(it.cat)+' <b class="num">'+fmt2(it.amt)+'</b>';
    b.onclick=function(){quickLog(it);};
    q.appendChild(b);
  });
}
function burst(em){
  for(var i=0;i<6;i++){
    var s=document.createElement('span');s.className='pop';s.textContent=em;
    s.style.setProperty('--dx',(Math.random()*160-80)+'px');
    s.style.setProperty('--dy',(-40-Math.random()*110)+'px');
    document.body.appendChild(s);
    setTimeout(function(el){return function(){el.remove();};}(s),700);
  }
}

function press(t){
  if(t==='тМл'){ amt=amt.slice(0,-1); }
  else if(t==='.'){ if(amt.indexOf('.')<0) amt=(amt===''?'0':amt)+'.'; }
  else {
    if(amt.indexOf('.')>=0 && amt.split('.')[1].length>=2) return;
    if(amt==='0') amt=t; else amt+=t;
    if(amt.replace('.','').length>7) amt=amt.slice(0,-1);
  }
  renderAmt();
}
var manualSel={method:false,need:false}; // user touched a toggle since last log тЖТ their pick beats the learned default
document.getElementById('methodSeg').addEventListener('click',function(e){if(e.target.dataset.v){cfg.method=e.target.dataset.v;manualSel.method=true;save(CKEY,cfg);renderMethods();}});
document.getElementById('needSeg').addEventListener('click',function(e){if(e.target.dataset.v){cfg.need=e.target.dataset.v;manualSel.need=true;save(CKEY,cfg);renderNeed();}});

function catDefault(name){ // majority method/need from this category's last 20 logs; needs тЙе3 logs and a 70% majority
  var m={},n={},cnt=0;
  for(var i=entries.length-1;i>=0&&cnt<20;i--){
    var e=entries[i]; if(e.cat!==name) continue;
    cnt++; m[e.method]=(m[e.method]||0)+1; n[e.need]=(n[e.need]||0)+1;
  }
  if(cnt<3) return null;
  function top(o){var b=null;for(var k in o)if(b===null||o[k]>o[b])b=k;return b;}
  var tm=top(m), tn=top(n);
  return {
    method:(m[tm]>=cnt*0.7&&cfg.methods.indexOf(tm)>=0)?tm:null,
    need:(n[tn]>=cnt*0.7)?tn:null
  };
}

function logExpense(cat,el){
  var v=parseFloat(amt);
  if(!v||v<=0){ toast('Enter an amount first'); return; }
  var noteEl=document.getElementById('note'); var note=(noteEl&&noteEl.value||'').trim();
  var d=catDefault(cat.n)||{};
  var useM=(!manualSel.method&&d.method)?d.method:cfg.method;
  var useN=(!manualSel.need&&d.need)?d.need:cfg.need;
  var firstToday = !entries.some(function(x){return entryDay(x)===todayKey();});
  var entry={id:genId(), amt:v, cat:cat.n, e:cat.e, method:useM, need:useN, note:note, ts:new Date().toISOString()};
  entries.push(entry);
  save(KEY,entries);
  if(useM!==cfg.method||useN!==cfg.need){cfg.method=useM;cfg.need=useN;save(CKEY,cfg);renderMethods();renderNeed();}
  manualSel.method=false; manualSel.need=false;
  amt=''; renderAmt(); if(noteEl){noteEl.value='';noteEl.blur();} renderTotals(); renderQuick();
  el.classList.add('flash'); setTimeout(function(){el.classList.remove('flash');},220);
  burst(cat.e);
  if(navigator.vibrate) navigator.vibrate(15);
  showLast(entry, firstToday&&streak()>=2 ? ' ┬╖ ЁЯФе day '+streak() : '');
}
function quickLog(it){
  var d=catDefault(it.cat)||{};
  var useM=(!manualSel.method&&d.method)?d.method:cfg.method;
  var firstToday = !entries.some(function(x){return entryDay(x)===todayKey();});
  var entry={id:genId(), amt:it.amt, cat:it.cat, e:it.e, method:useM, need:it.need, note:'', ts:new Date().toISOString()};
  entries.push(entry);
  save(KEY,entries);
  if(useM!==cfg.method){cfg.method=useM;save(CKEY,cfg);renderMethods();}
  manualSel.method=false; manualSel.need=false;
  renderTotals(); renderQuick();
  burst(it.e);
  if(navigator.vibrate) navigator.vibrate(15);

function breakHtml(){
  function sum(s,e){return s+e.amt;}
  var mo=thisMonth(), tot=mo.reduce(sum,0);
  var now=new Date(), day=now.getDate(), dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  var proj=tot/day*dim;
  var pd=new Date(now.getFullYear(),now.getMonth()-1,1), pKey=ymKey(pd);
  var pName=pd.toLocaleDateString('en-GB',{month:'short'});
  var pm=entries.filter(function(e){return entryMonth(e)===pKey;});
  var pTot=pm.reduce(sum,0);
  var pToDate=pm.filter(function(e){return +entryDay(e).slice(8)<=day;}).reduce(sum,0);

  var pace='<div class="pace num'+(cfg.budget>0&&proj>cfg.budget?' over':'')+'">Day '+day+' of '+dim+
    ' ┬╖ on pace for <b>RM '+fmt(proj)+'</b>'+(cfg.budget>0?' of RM '+fmt(cfg.budget):'')+'</div>';

  var vs='';
  if(pToDate>0){
    var dl=Math.round((tot-pToDate)/pToDate*100);
    vs+='<div class="row"><div class="l">vs '+pName+' by day '+day+' (RM '+fmt(pToDate)+')</div>'+
      '<b class="num '+(dl>0?'up':'dn')+'">'+(dl>0?'тЦ▓ +':'тЦ╝ ')+dl+'%</b></div>';
  }
  if(pTot>0) vs+='<div class="row"><div class="l">'+pName+' full month</div><b class="num">RM '+fmt(pTot)+'</b></div>';

  var byDay={}, maxD=0;
  mo.forEach(function(e){var dd=+entryDay(e).slice(8);byDay[dd]=(byDay[dd]||0)+e.amt;});
  for(var bk in byDay) if(byDay[bk]>maxD) maxD=byDay[bk];
  var off=(new Date(now.getFullYear(),now.getMonth(),1).getDay()+6)%7, cells='';
  for(var o=0;o<off;o++) cells+='<div style="background:transparent"></div>';
  for(var dn=1;dn<=dim;dn++){
    var v=byDay[dn]||0, st='';
    if(v&&maxD){var a=0.15+0.65*v/maxD; st='background:rgba(207,111,134,'+a.toFixed(2)+')'+(v/maxD>0.55?';color:#fff':'');}
    if(dn===day) st+=(st?';':'')+'box-shadow:inset 0 0 0 2px var(--lav)';
    var dk=monthKey+'-'+String(dn).padStart(2,'0');
    cells+='<div style="cursor:pointer'+(st?';'+st:'')+'" onclick="openDay(\''+dk+'\')">'+dn+'</div>';
  }

  var need=mo.filter(function(e){return e.need==='need';}).reduce(sum,0), want=tot-need;
  var pNeed=pm.filter(function(e){return e.need==='need';}).reduce(sum,0);
  var nPct=tot?Math.round(need/tot*100):0, pPct=pTot?Math.round(pNeed/pTot*100):null;

  var avg={};
  for(var mi=1;mi<=3;mi++){
    var mk=ymKey(new Date(now.getFullYear(),now.getMonth()-mi,1));
    entries.forEach(function(e){if(entryMonth(e)===mk)avg[e.cat]=(avg[e.cat]||0)+e.amt;});
  }
  for(var ck in avg) avg[ck]/=3;
  var gc={}; mo.forEach(function(e){gc[e.cat]=(gc[e.cat]||0)+e.amt;});
  var catRows=Object.keys(gc).sort(function(a,b){return gc[b]-gc[a];}).map(function(k){
    var t='';
    if(avg[k]>=20&&day>=5){ // projected month-end vs the 3-month average; too noisy before day 5
      var dp=Math.round((gc[k]/day*dim-avg[k])/avg[k]*100);
      if(dp>=20) t=' <span class="up">тЦ▓'+dp+'%</span>';
      else if(dp<=-20) t=' <span class="dn">тЦ╝'+(-dp)+'%</span>';
    }
    return '<div class="row"><div class="l">'+esc(k)+t+'</div><b class="num">RM '+fmt(gc[k])+'</b></div>';
  }).join('')||'<div class="mini">тАФ</div>';
  var gm={}; mo.forEach(function(e){gm[e.method]=(gm[e.method]||0)+e.amt;});
  var mRows=Object.keys(gm).sort(function(a,b){return gm[b]-gm[a];}).map(function(k){
    return '<div class="row"><div class="l">'+esc(k)+'</div><b class="num">RM '+fmt(gm[k])+'</b></div>';
  }).join('')||'<div class="mini">тАФ</div>';

  return '<h2>'+new Date(monthKey+'-01').toLocaleDateString('en-GB',{month:'long'})+
    ' <span>RM '+fmt(tot)+' ┬╖ '+mo.length+' logs</span><button class="x" onclick="closeSheet()">тЬХ</button></h2>'+
    pace+vs+
    '<div class="bdh">Daily heat ┬╖ tap a day</div><div class="heat num">'+cells+'</div>'+
    '<div class="row"><div class="l">ЁЯЯв Need (essential)'+(pPct!=null?'<small>'+nPct+'% of month ┬╖ '+pName+' was '+pPct+'%</small>':'')+'</div><b class="num">RM '+fmt(need)+'</b></div>'+
    '<div class="row"><div class="l">ЁЯЯа Want (could cut)</div><b class="num">RM '+fmt(want)+'</b></div>'+
    '<div class="bdh">By category ┬╖ тЦ▓тЦ╝ vs 3-month average</div>'+catRows+
    '<div class="bdh">By account ┬╖ check vs your statements</div>'+mRows+
    '<button class="copybtn" onclick="copyMonth()">Copy month summary</button>'+
    '<div class="mini">Paste the total into Wealth&nbsp;OS тЖТ Lifestyle Budget.</div>';
}
function copyMonth(){

  var byCat={}; mo.forEach(function(e){byCat[e.cat]=(byCat[e.cat]||0)+e.amt;});
  var byM={}; mo.forEach(function(e){byM[e.method]=(byM[e.method]||0)+e.amt;});

function ghReq(method,url,body,cb){
  fetch(url,{method:method,headers:{
    'Authorization':'Bearer '+cfg.ghToken,
    'Accept':'application/vnd.github+json',
    'Content-Type':'application/json'
  },body:body?JSON.stringify(body):undefined})
  .then(function(r){if(!r.ok)throw new Error('GitHub '+r.status);return r.json();})
  .then(function(j){cb(null,j);},function(e){cb(e);});
}
function syncPayload(){
  var c={};for(var k in cfg){if(k!=='ghToken'&&k!=='gistId'&&k!=='syncPass')c[k]=cfg[k];}
  return JSON.stringify({v:1,savedAt:new Date().toISOString(),entries:entries,cfg:c});
}
/* passphrase encryption: AES-GCM, key from PBKDF2(passphrase) */
function b64(buf){var s='';new Uint8Array(buf).forEach(function(x){s+=String.fromCharCode(x);});return btoa(s);}
function unb64(s){var bin=atob(s),a=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a;}
function deriveKey(pass,salt){
  return crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey'])
    .then(function(km){return crypto.subtle.deriveKey(
      {name:'PBKDF2',salt:salt,iterations:150000,hash:'SHA-256'},km,
      {name:'AES-GCM',length:256},false,['encrypt','decrypt']);});
}
function encryptPayload(txt,pass){
  var salt=crypto.getRandomValues(new Uint8Array(16)),iv=crypto.getRandomValues(new Uint8Array(12));
  return deriveKey(pass,salt).then(function(key){
    return crypto.subtle.encrypt({name:'AES-GCM',iv:iv},key,new TextEncoder().encode(txt));
  }).then(function(ct){
    return JSON.stringify({v:2,enc:true,salt:b64(salt),iv:b64(iv),data:b64(ct)});
  });
}
function decryptPayload(obj,pass){
  return deriveKey(pass,unb64(obj.salt)).then(function(key){
    return crypto.subtle.decrypt({name:'AES-GCM',iv:unb64(obj.iv)},key,unb64(obj.data));
  }).then(function(pt){return new TextDecoder().decode(pt);});
}
function buildPayload(cb,interactive){
  var txt=syncPayload();
  if(cfg.syncPass)encryptPayload(txt,cfg.syncPass).then(cb,function(){syncing=false;syncFail(new Error('encrypt'),interactive);});
  else cb(txt);
}
function syncFail(err,interactive){
  if(/401|403/.test(err&&err.message)){ // dead token: forget it so Settings shows the paste field again
    cfg.ghToken='';save(CKEY,cfg,true);setCloud('');
    toast('Token rejected тАФ paste a new one in тЪЩ');
  } else {
    setCloud('err');
    if(interactive)toast('Sync failed тАФ offline?');
  }
}
function schedSync(){
  if(!cfg.ghToken)return;
  clearTimeout(syncT);setCloud('pending');
  syncT=setTimeout(function(){pushSync();},1800);
}
function pushSync(interactive){
  if(!cfg.ghToken||syncing)return;syncing=true;
  buildPayload(function(content){
    var files={};files[GIST_FILE]={content:content};
    function done(err,j){
      syncing=false;
      if(err){syncFail(err,interactive);return;}
      if(j&&j.id&&cfg.gistId!==j.id){cfg.gistId=j.id;}
      cfg.lastSync=Date.now();save(CKEY,cfg,true);setCloud('ok');
      if(interactive)toast('Backed up to cloud тШБя╕П');
    }
    if(cfg.gistId){
      ghReq('PATCH','https://api.github.com/gists/'+cfg.gistId,{files:files},function(err,j){
        if(err&&/404/.test(err.message)){cfg.gistId='';syncing=false;pushSync(interactive);}
        else done(err,j);
      });
    } else {
      ghReq('POST','https://api.github.com/gists',
        {description:'Spend tracker sync (auto-backup)',public:false,files:files},done);
    }
  },interactive);
}
function pullSync(interactive){
  if(!cfg.ghToken)return;
  setCloud('pending');
  if(cfg.gistId)fetchGist(interactive);else findGist(interactive);
}
function findGist(interactive){
  ghReq('GET','https://api.github.com/gists?per_page=100',null,function(err,list){
    if(err){syncFail(err,interactive);return;}
    var g=null;
    (list||[]).some(function(x){if(x.files&&x.files[GIST_FILE]){g=x;return true;}return false;});
    if(g){cfg.gistId=g.id;save(CKEY,cfg,true);fetchGist(interactive);}
    else pushSync(interactive); // nothing in the cloud yet: first upload
  });
}
function fetchGist(interactive){
  ghReq('GET','https://api.github.com/gists/'+cfg.gistId,null,function(err,j){
    if(err){
      if(/404/.test(err.message)){cfg.gistId='';save(CKEY,cfg,true);findGist(interactive);}
      else syncFail(err,interactive);
      return;
    }
    var f=j.files&&j.files[GIST_FILE];
    if(!f){pushSync(interactive);return;}
    if(f.truncated)fetch(f.raw_url).then(function(r){return r.text();})
      .then(function(t){mergeRemote(t,interactive);},function(e){syncFail(e,interactive);});
    else mergeRemote(f.content,interactive);
  });
}
function mergeRemote(txt,interactive){
  var data=null;try{data=JSON.parse(txt);}catch(e){}
  if(data&&data.enc){
    if(!cfg.syncPass){setCloud('err');toast('Cloud copy is encrypted тАФ connect with your passphrase');return;}
    decryptPayload(data,cfg.syncPass).then(function(pt){
      var d=null;try{d=JSON.parse(pt);}catch(e){}
      applyRemote(d,interactive);
    },function(){ // wrong passphrase: reset so Settings shows the connect fields again
      cfg.ghToken='';cfg.syncPass='';cfg.gistId='';save(CKEY,cfg,true);
      setCloud('');toast('Wrong passphrase тАФ nothing restored, reconnect in тЪЩ');
    });
    return;
  }
  applyRemote(data,interactive);
}
function applyRemote(data,interactive){
  if(!data||!data.entries){pushSync(interactive);return;}
  var localEmpty=entries.length===0;
  var seen={};entries.forEach(function(e){seen[e.ts+'|'+parseFloat(e.amt)]=1;});
  var added=0;
  data.entries.forEach(function(e){
    if(!e||!e.ts||!(parseFloat(e.amt)>0))return;
    var k=e.ts+'|'+parseFloat(e.amt);if(seen[k])return;seen[k]=1;
    if(!e.id)e.id=genId();
    entries.push(e);added++;
  });
  if(added){entries.sort(function(a,b){return a.ts<b.ts?-1:1;});save(KEY,entries,true);}
  if(localEmpty&&data.cfg&&data.cfg.cats&&data.cfg.methods){
    var tok=cfg.ghToken,gid=cfg.gistId,pw=cfg.syncPass;
    cfg=data.cfg;cfg.ghToken=tok;cfg.gistId=gid;cfg.syncPass=pw;
    if(cfg.methods.indexOf(cfg.method)<0)cfg.method=cfg.methods[0];
    save(CKEY,cfg,true);
    renderMethods();renderNeed();renderCats();
  }
  renderTotals();renderQuick();
  if(interactive)toast(added?('тШБя╕П Restored '+added+' entr'+(added===1?'y':'ies')):'тШБя╕П Connected тАФ up to date');
  pushSync(); // push the merged state back up
}
function connectSync(){
  var inp=document.getElementById('ghTok');
  var tok=(inp&&inp.value||'').trim();
  if(tok.length<20){toast('Paste a GitHub token first');return;}
  var pass=((document.getElementById('ghPass')||{}).value||'').trim();
  if(pass&&!(window.crypto&&crypto.subtle&&window.TextEncoder)){toast('Encryption needs https тАФ open the GitHub Pages URL');return;}
  cfg.ghToken=tok;cfg.syncPass=pass;cfg.gistId='';save(CKEY,cfg,true);
  document.getElementById('nudge').style.display='none';
  closeSheet();
  pullSync(true);
}
function disconnectSync(){
  cfg.ghToken='';cfg.gistId='';cfg.syncPass='';save(CKEY,cfg,true);
  setCloud('');openSheet('set');toast('Cloud sync off');
}
function syncStatus(){
  var lock=cfg.syncPass?' ┬╖ ЁЯФТ encrypted':'';
  if(!cfg.lastSync)return 'Connected тАФ first sync pending'+lock;
  var m=Math.round((Date.now()-cfg.lastSync)/60000);
  return 'Last synced '+(m<1?'just now':m<60?m+' min ago':Math.round(m/60)+' h ago')+lock;
}
function csvFields(line){
  var f=[],cur='',q=false;
  for(var i=0;i<line.length;i++){
    var c=line[i];
    if(q){ if(c==='"'){ if(line[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
    else if(c==='"') q=true;
    else if(c===','){ f.push(cur);cur=''; }
    else cur+=c;
  }
  f.push(cur);return f;
}
function parseCsv(txt){
  var lines=txt.split(/\r?\n/), out=[];
  var start=(lines[0]||'').toLowerCase().indexOf('date')===0?1:0;
  for(var i=start;i<lines.length;i++){
    if(!lines[i])continue;
    var f=csvFields(lines[i]); if(f.length<2)continue;
    out.push({ts:f[0],amt:f[1],cat:f[2],method:f[3],need:f[4],note:f[5]});
  }
  return out;
}
function doImport(txt){
  txt=(txt||'').trim();
  var incoming=null, newCfg=null;
  if(txt[0]==='{'||txt[0]==='['){
    try{var j=JSON.parse(txt);incoming=Array.isArray(j)?j:j.entries;if(j.cfg)newCfg=j.cfg;}catch(err){}
  } else if(txt){
    incoming=parseCsv(txt);
  }
  if(!incoming||!incoming.length){toast('Nothing to import');return;}
  var catE={};cfg.cats.forEach(function(c){catE[c.n]=c.e;});
  if(newCfg&&newCfg.cats)newCfg.cats.forEach(function(c){catE[c.n]=c.e;});
  var seen={};entries.forEach(function(e){seen[e.ts+'|'+e.amt]=1;});
  var added=0;
  incoming.forEach(function(e){
    if(!e)return;
    var v=parseFloat(e.amt), ts=e.ts;
    if(!ts||isNaN(new Date(ts).getTime())||!(v>0))return;
    var k=ts+'|'+v; if(seen[k])return; seen[k]=1;
    entries.push({id:genId(),amt:v,cat:e.cat||'Other',e:e.e||catE[e.cat]||'ЁЯУМ',method:e.method||'',
      need:e.need==='need'?'need':'want',note:e.note||'',ts:ts});
    added++;
  });
  entries.sort(function(a,b){return a.ts<b.ts?-1:1;});
  save(KEY,entries);
  if(newCfg&&newCfg.cats&&newCfg.methods&&newCfg.methods.length){
    cfg=newCfg;
    if(cfg.methods.indexOf(cfg.method)<0)cfg.method=cfg.methods[0];
    save(CKEY,cfg);renderMethods();renderNeed();renderCats();
  }
  renderTotals();renderQuick();closeSheet();
  toast(added?('Imported '+added+' entr'+(added===1?'y':'ies')):'No new entries тАФ all duplicates');
}

window.openSheet=openSheet;window.closeSheet=closeSheet;window.undoLast=undoLast;
window.delEntry=delEntry;window.copyMonth=copyMonth;window.addCat=addCat;window.rmCat=rmCat;
window.addMethod=addMethod;window.rmMethod=rmMethod;window.exportAll=exportAll;
window.backupFile=backupFile;window.doImport=doImport;
window.connectSync=connectSync;window.disconnectSync=disconnectSync;window.pullSync=pullSync;
window.hideLast=hideLast;window.lastFlipNeed=lastFlipNeed;window.lastCycleMethod=lastCycleMethod;
window.openEdit=openEdit;window.saveEdit=saveEdit;window.openDay=openDay;

// Home-Screen web apps cache the HTML hard and won't show a new deploy on their
// own. On each load (when online) fetch the live copy bypassing cache, and if its
// version marker differs, offer a one-tap reload. Purely advisory тАФ can't brick
// the app, and does nothing offline.
function checkUpdate(){
  if(navigator.onLine===false) return;
  fetch(location.pathname+'?_='+Date.now(),{cache:'no-store'})
    .then(function(r){return r.ok?r.text():null;})
    .then(function(t){
      if(!t) return;
      var m=t.match(/APPVER:([0-9a-z-]+)/);
      if(m&&m[1]&&m[1]!==APP_VERSION) showUpdateBanner();
    }).catch(function(){});
}
function showUpdateBanner(){
  if(document.getElementById('upd')) return;
  var b=document.createElement('div'); b.id='upd'; b.className='upd';
  b.innerHTML='<span>New version available</span>'+
    '<button onclick="location.reload()">Update</button>'+
    '<button class="updx" onclick="this.parentNode.remove()">тЬХ</button>';
  document.body.appendChild(b);
}
setTimeout(checkUpdate,1500);

renderMethods();renderNeed();renderCats();renderKeys();renderQuick();renderAmt();renderTotals();

// ask the browser not to evict our storage under pressure (iOS ignores, Chrome honors)
if(navigator.storage && navigator.storage.persist) navigator.storage.persist();
// backup nudge: worth protecting + no backup in 7 days + no cloud sync covering us
if(!cfg.ghToken && entries.length>=10 && (!cfg.lastBackup || Date.now()-cfg.lastBackup>7*864e5))
  document.getElementById('nudge').style.display='block';
if(cfg.ghToken){ setCloud('ok'); if(!entries.length) pullSync(); }
</script>
